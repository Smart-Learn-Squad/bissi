<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D12" />
      <stop offset="100%" style="stop-color:#1A1A2E" />
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7" />
      <stop offset="100%" style="stop-color:#7e22ce" />
    </linearGradient>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gemLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gemRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e1065;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g stroke="#1E1E2E" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100" /><line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" /><line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
    <line x1="200" y1="0" x2="200" y2="630" /><line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Gem logo (scaled and centered left) -->
  <g transform="translate(180, 130) scale(1.8)">
    <path d="M40 75 L100 185 L100 75 Z" fill="url(#gemLeft)" />
    <path d="M160 75 L100 185 L100 75 Z" fill="url(#gemRight)" />
    <path d="M40 75 L60 35 L100 75 Z" fill="#9333ea" fill-opacity="0.8" />
    <path d="M160 75 L140 35 L100 75 Z" fill="#6b21a8" fill-opacity="0.8" />
    <path d="M60 35 L140 35 L100 75 Z" fill="url(#gemTop)" />
    <path d="M40 75 L160 75 M60 35 L140 35 M100 75 L100 185" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="0.5" />
  </g>

  <!-- Title -->
  <text x="420" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#E2E8F0" letter-spacing="-1">
    Bissi
    <tspan fill="url(#acc)" font-size="72">.</tspan>
  </text>

  <!-- Tagline -->
  <text x="420" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#94A3B8" letter-spacing="0.5">
    Your Personal Task Handler
  </text>

  <!-- Subtitle -->
  <text x="420" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#64748B">
    Local AI agent powered by Gemma 4 E2B — entirely offline
  </text>

  <!-- Feature pills -->
  <g transform="translate(420, 380)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#1E1E2E" stroke="#2E2E3E" stroke-width="1" />
    <text x="65" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#a855f7" text-anchor="middle">🤖 100% Offline</text>

    <rect x="145" y="0" width="130" height="32" rx="16" fill="#1E1E2E" stroke="#2E2E3E" stroke-width="1" />
    <text x="210" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#a855f7" text-anchor="middle">🔒 Fully Private</text>

    <rect x="290" y="0" width="140" height="32" rx="16" fill="#1E1E2E" stroke="#2E2E3E" stroke-width="1" />
    <text x="360" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#a855f7" text-anchor="middle">📄 File Agent</text>

    <rect x="445" y="0" width="120" height="32" rx="16" fill="#1E1E2E" stroke="#2E2E3E" stroke-width="1" />
    <text x="505" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#a855f7" text-anchor="middle">🧪 Python</text>
  </g>

  <!-- Bottom badge -->
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#475569" text-anchor="middle">
    Built for Gemma 4 Good · Kaggle Hackathon
  </text>

  <!-- Decorative accent line -->
  <rect x="420" y="295" width="60" height="3" rx="1.5" fill="url(#acc)" />
</svg>
