<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé face supérieure -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé facettes inférieures (effet de profondeur) -->
    <linearGradient id="leftFacet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rightFacet" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e1065;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Corps du diamant en 3D -->
  <!-- Facette basse gauche -->
  <path d="M40 75 L100 185 L100 75 Z" fill="url(#leftFacet)" />
  <!-- Facette basse droite -->
  <path d="M160 75 L100 185 L100 75 Z" fill="url(#rightFacet)" />
  
  <!-- Facettes de transition (bordures hautes) -->
  <path d="M40 75 L60 35 L100 75 Z" fill="#9333ea" fill-opacity="0.8" />
  <path d="M160 75 L140 35 L100 75 Z" fill="#6b21a8" fill-opacity="0.8" />
  
  <!-- Table supérieure (Face plate) -->
  <path d="M60 35 L140 35 L100 75 Z" fill="url(#topFace)" />
  
  <!-- Lignes de structure pour souligner la 3D -->
  <path d="M40 75 L160 75 M60 35 L140 35 M100 75 L100 185" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Étoile animée (Haut à gauche) -->
  <g transform="translate(50, 45)">
    <path d="M0 -18 Q2 -2 18 0 Q2 2 0 18 Q-2 2 -18 0 Q-2 -2 0 -18" fill="white" fill-opacity="0.9">
      <!-- Animation de rotation -->
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 0 0" 
        to="10 0 0" 
        dur="1.5s" 
        repeatCount="indefinite" 
        additive="sum" />
      <!-- Animation de pulsation (scale) -->
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.8;1.1;0.8" 
        dur="1.5s" 
        repeatCount="indefinite" 
        additive="sum" />
    </path>
  </g>
</svg>
