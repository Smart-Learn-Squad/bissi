<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISSI Master</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap');

      /* Dark mode (default) */
      :root {
        --bg: #151517;
        --sb: #0d1510;
        --surface: #111a15;
        --surface-soft: #1a2420;
        --surface-strong: #223d33;
        --text: #e2f5ec;
        --muted: rgba(120, 180, 150, 0.6);
        --acc: #10b981;
        --acc-light: #d1fae5;
        --glass-border: rgba(16, 185, 129, 0.15);
        --glass-hover: rgba(16, 185, 129, 0.08);
        --glass-acc: rgba(16, 185, 129, 0.12);
        --edge: rgba(16, 185, 129, 0.2);
        --shadow: 0 4px 24px rgba(16, 185, 129, 0.08);
        --tool-line: rgba(16, 185, 129, 0.10);
      }

      /* Light mode */
      body.light {
        --bg: #f0faf5;
        --sb: #ffffff;
        --surface: #f7fdf9;
        --surface-soft: #f0faf5;
        --surface-strong: #e8f5f0;
        --text: #0a1f15;
        --muted: rgba(10, 80, 50, 0.55);
        --acc: #10b981;
        --acc-light: #d1fae5;
        --glass-border: rgba(16, 185, 129, 0.15);
        --glass-hover: rgba(16, 185, 129, 0.06);
        --glass-acc: rgba(16, 185, 129, 0.08);
        --edge: rgba(16, 185, 129, 0.15);
        --shadow: 0 4px 24px rgba(16, 185, 129, 0.06);
        --tool-line: rgba(16, 185, 129, 0.08);
      }

      /* Flatten dark theme: keep every major surface on the same background */
      body:not(.light) .sb,
      body:not(.light) .sb-top,
      body:not(.light) .bulk-actions,
      body:not(.light) .sb-foot,
      body:not(.light) .main,
      body:not(.light) .m-head,
      body:not(.light) .empty,
      body:not(.light) .msgs,
      body:not(.light) .in-area,
      body:not(.light) .in-pill,
      body:not(.light) .canvas,
      body:not(.light) .cv-h,
      body:not(.light) .cv-tabs,
      body:not(.light) .cv-body,
      body:not(.light) .dv,
      body:not(.light) .attached-file,
      body:not(.light) .ms,
      body:not(.light) .think-w,
      body:not(.light) .ci-menu,
      body:not(.light) .floating-ci-menu {
        background: var(--bg);
        box-shadow: none;
      }

      body:not(.light) .sb,
      body:not(.light) .main,
      body:not(.light) .m-head,
      body:not(.light) .sb-top,
      body:not(.light) .bulk-actions,
      body:not(.light) .sb-foot,
      body:not(.light) .in-pill,
      body:not(.light) .canvas,
      body:not(.light) .cv-h,
      body:not(.light) .cv-tabs,
      body:not(.light) .cv-body,
      body:not(.light) .dv,
      body:not(.light) .attached-file,
      body:not(.light) .ms,
      body:not(.light) .think-w,
      body:not(.light) .ci-menu,
      body:not(.light) .floating-ci-menu {
        border-color: var(--glass-border);
      }

      body:not(.light) .m-head,
      body:not(.light) .sb-top,
      body:not(.light) .bulk-actions,
      body:not(.light) .sb-foot,
      body:not(.light) .in-area,
      body:not(.light) .empty,
      body:not(.light) .msgs,
      body:not(.light) .canvas {
        background: var(--bg);
      }

      body:not(.light) .in-pill,
      body:not(.light) .ms,
      body:not(.light) .think-w,
      body:not(.light) .dv,
      body:not(.light) .attached-file,
      body:not(.light) .ci-menu,
      body:not(.light) .floating-ci-menu {
        background: var(--bg);
      }

        box-sizing: border-box;

      }
      
      textarea, input {
        cursor: text;
      }
      
      button, .ci, .ms, .new-btn, .send-btn, .ic-btn {
        cursor: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDMyIDMyIj4KICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAK CiAgICA8cmFkaWFsR3JhZGllbnQgaWQ9ImhhbG8iIGN4PSI1MCUiIGN5PSI1MCUiIHI9IjUwJSI+CiAgICAgIDxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiM3YzNhZWQiIHN0b3Atb3BhY2l0eT0iMC4zNSIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiM3YzNhZWQiIHN0b3Atb3BhY2l0eT0iMCIvPgogICAgPC9yYWRpYWxHcmFkaWVudD4KICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAKICAK CiBjaXJjbGUgY3g9IjEwIiBjeT0iMTAiIHI9IjE0IiBmaWxsPSJ1cmwoI2hhbG8pIi8+CiAgPHBvbHlnb24gcG9pbnRzPSI0LDIgNCwyNCA5LDE4IDEyLDI2IDE1LDI1IDEyLDE3IDE5LDE3IiBmaWxsPSIjN2MzYWVkIiBzdHJva2U9IiNjNGI1ZmQiIHN0cm9rZS13aWR0aD0iMSIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgogIDxwb2x5Z29uIHBvaW50cz0iNCwyIDQsMTAgOCw2IiBmaWxsPSIjYzRiNWZkIiBvcGFjaXR5PSIwLjY1Ii8+Cjwvc3ZnPgo=') 4 2, pointer;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0; padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        transition: background 0.2s, color 0.2s;
      }

      .body { display: flex; flex: 1; min-height: 0; }

      /* ── SIDEBAR ── */
      .sb {
        width: 248px; min-width: 248px;
        background: var(--surface);
        border-right: 1px solid var(--glass-border);
        display: flex; flex-direction: column;
        transition: width 0.25s, min-width 0.25s, opacity 0.2s;
        overflow: visible;
        position: relative; /* ensure footer can be positioned inside */
      }
      .sb.collapsed { width: 0; min-width: 0; opacity: 0; border-right: none; pointer-events: none; box-shadow: none; }
      /* When collapsed, hide the footer to avoid ghost UI */
      .sb.collapsed .sb-foot { opacity: 0; pointer-events: none; transform: translateY(6px); }

      .sb-top {
        margin: 12px 12px 8px;
        padding: 14px 12px 12px;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        background: var(--surface-soft);
      }

      .bulk-actions {
        margin: 0 12px 8px;
        padding: 8px;
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        background: var(--surface-soft);
        display: none;
        align-items: center;
        gap: 8px;
      }
      .bulk-actions.on { display: flex; }
      .bulk-count {
        font-size: 12px;
        color: var(--muted);
        margin-right: auto;
      }
      .bulk-btn {
        width: 30px; height: 30px;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }
      .bulk-btn:hover { background: var(--acc-light); color: var(--acc); }
      .bulk-btn.danger:hover { background: rgba(220,38,38,0.16); color: #dc2626; }
      .bulk-btn svg { width: 14px; height: 14px; display: block; }

      .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
      .logo-gem { width: 28px; height: 28px; flex-shrink: 0; }
      .logo-name {
        font-family: 'Syne', sans-serif; font-weight: 700;
        font-size: 15px; letter-spacing: 0.06em; color: var(--acc);
      }
      .logo-badge {
        margin-left: auto; font-size: 11px; font-weight: 500;
        letter-spacing: 0.08em; color: var(--acc);
        background: var(--glass-acc); padding: 2px 7px;
        border-radius: 5px; border: 1px solid var(--glass-border);
      }

      .new-btn {
        width: 100%; padding: 9px 12px;
        background: var(--acc);
        border: none; border-radius: 12px;
        font-family: 'DM Sans', sans-serif; font-size: 12.5px;
        font-weight: 500; color: #fff; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 5px;
        box-shadow: 0 4px 14px rgba(124,58,237,0.30);
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .new-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(124,58,237,0.38); }

      .sec { padding: 8px 12px 2px; }
      .sec-lbl {
        font-size: 9.5px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--muted); margin: 0 0 5px 2px;
      }
      .ci {
        display: flex; align-items: center; gap: 7px; min-height: 32px;
        padding: 6px 8px; border-radius: 10px; cursor: pointer;
        margin-bottom: 2px; position: relative;
        transition: background 0.12s, transform 0.12s;
      }
      .ci:hover, .ci.on { background: var(--glass-hover); transform: translateX(1px); }
      .ci.on .ci-t { color: var(--acc); font-weight: 500; }
      .ci.selected { background: rgba(16,185,129,0.14); }
      .ci.selected .ci-t { color: var(--text); }
      .ci-select {
        width: 18px; height: 18px; border-radius: 6px;
        border: 1px solid var(--glass-border);
        background: transparent; flex-shrink: 0;
        display: inline-flex; align-items: center; justify-content: center;
        color: transparent;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
        opacity: 0;
      }
      .ci.select-mode .ci-select { opacity: 1; }
      .ci.selected .ci-select {
        background: var(--acc);
        border-color: var(--acc);
        color: #fff;
      }
      /* hide the small status dot behind conversation names */
      .ci-dot { display: none !important; }
      .ci.on .ci-dot { opacity: 1; background: var(--acc); }
      .ci-t { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .ci-ts { margin-left: auto; font-size: 9.5px; color: var(--muted); flex-shrink: 0; }

      .ci-actions { position: absolute; top: 50%; right: 4px; transform: translateY(-50%); }
      .ci-menu-btn {
        width: 20px; height: 20px; border-radius: 6px; border: 1px solid transparent;
        background: transparent; color: var(--muted);
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer; opacity: 0;
        transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .ci:hover .ci-menu-btn,
      .ci.on .ci-menu-btn,
      .ci-menu-open .ci-menu-btn { opacity: 1; }
      .ci-menu-btn:hover {
        background: rgba(255,255,255,0.08);
        color: var(--text);
        border-color: rgba(255,255,255,0.08);
      }
      .ci-menu {
        position: absolute; right: 24px; top: 24px; min-width: 150px;
        background: var(--surface-strong); border: 1px solid var(--glass-border);
        border-radius: 10px; box-shadow: 0 18px 42px rgba(0,0,0,0.12);
        padding: 6px; z-index: 4500;
      }
      .ci-menu.hidden { display: none; }
      .ci-menu-item {
        width: 100%; display: flex; align-items: center; gap: 8px;
        border: 0; background: transparent; color: var(--text);
        padding: 8px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: left;
        transition: background 0.12s;
      }
      .ci-menu-item:hover { background: var(--glass-hover); }
      .ci-menu-item.danger { color: #dc2626; }

      /* Floating cloned menu (appended to body) to avoid stacking/overflow issues */
      .floating-ci-menu {
        position: fixed !important;
        z-index: 10000 !important;
        min-width: 150px; max-width: 320px;
        background: var(--surface-strong);
        border: 1px solid var(--glass-border);
        border-radius: 10px; box-shadow: 0 18px 48px rgba(0,0,0,0.18);
        padding: 6px; overflow: visible;
      }

      .sb-foot {
        margin-top: auto; padding: 10px 12px;
        border-top: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 8px;
        position: absolute; left: 0; right: 0; bottom: 12px;
        box-sizing: border-box; padding-left: 12px; padding-right: 12px;
        background: var(--surface-soft);
        border-radius: 12px; box-shadow: var(--shadow); z-index: 20;
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        pointer-events: auto;
      }

      .conversations { flex: 1; overflow-y: auto; padding: 8px 12px 96px; }
      .conversations .sec { margin-bottom: 6px; }
      .conversations::-webkit-scrollbar { width: 8px; }
      .conversations::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 8px; }
      .av {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--acc); border: 2px solid var(--acc-light);
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0;
      }
      .u-name { font-size: 12px; font-weight: 500; color: var(--text); }
      .u-sub { font-size: 9.5px; color: var(--muted); }
      .ic-btn {
        width: 26px; height: 26px; border-radius: 8px;
        border: 1px solid var(--glass-border);
        background: var(--surface-soft); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--muted); font-size: 13px; flex-shrink: 0;
        transition: background 0.12s; pointer-events: auto;
      }
      .ic-btn:hover { background: var(--acc-light); color: var(--acc); }
      
      /* Theme button in footer should be accessible */
      #th-btn { margin-left: auto; }

      /* ── MAIN ── */
      .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

      .m-head {
        padding: 10px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 8px;
      }

      .ms {
        display: flex; align-items: center; gap: 6px;
        padding: 5px 10px;
        background: var(--surface-soft);
        border: 1px solid var(--glass-border);
        border-radius: 10px; cursor: pointer;
        font-size: 13.5px; color: var(--text);
        font-family: 'DM Sans', sans-serif; position: relative;
      }
      .ms-arrow { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
      .ms-arrow.open { transform: rotate(180deg); }
      .ms-dd {
        position: absolute; top: calc(100% + 5px); left: 0;
        background: var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 10px; min-width: 210px; z-index: 20;
        box-shadow: 0 12px 32px rgba(124,58,237,0.12);
      }
      .ms-dd.hidden { display: none; }
      .ms-glbl {
        font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--muted); padding: 8px 10px 3px;
      }
      .ms-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; font-size: 13.5px; color: var(--text); border-radius: 8px; margin: 2px 4px; }
      .ms-opt:hover { background: var(--glass-hover); }
      .m-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
      .m-sz { font-size: 12px; color: var(--muted); margin-left: auto; }

      .think-w {
        margin-left: auto; display: flex; align-items: center; gap: 6px;
        font-size: 13px; color: var(--muted); cursor: pointer;
        padding: 4px 10px; border-radius: 8px;
        border: 1px solid var(--glass-border); background: var(--surface-soft);
        transition: background 0.12s;
      }
      .think-w:hover { background: var(--acc-light); }
      .tgl { width: 22px; height: 12px; background: var(--acc); border-radius: 6px; position: relative; transition: background 0.2s; }
      .tgl::after { content: ''; position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 2px; right: 2px; transition: right 0.2s; }
      .tgl.off { background: rgba(148,163,184,0.3); }
      .tgl.off::after { right: 12px; }

      /* ── EMPTY STATE ── */
      .empty {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; flex: 1; text-align: center; padding: 32px 24px;
      }
      .e-gem { margin-bottom: 24px; filter: drop-shadow(0 8px 24px rgba(124,58,237,0.22)); }
      .e-title {
        font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 600;
        color: var(--text); margin-bottom: 6px;
      }

      /* ── MESSAGES ── */
      .msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: thin; scrollbar-color: rgba(124,58,237,0.2) transparent; }
      .msgs-in { padding: 28px 20px 18px; display: flex; flex-direction: column; align-items: center; max-width: 860px; width: 100%; margin: 0 auto; }

      .msg-u-wrap { align-self: flex-end; width: 70%; display: flex; flex-direction: column; align-items: flex-end; margin-bottom: 8px; }
      .msg-u {
        width: 100%; background: var(--acc); color: #fff;
        padding: 9px 14px; border-radius: 14px 14px 3px 14px;
        font-size: 15px; line-height: 1.5;
      }
      .msg-a {
        align-self: stretch; width: 100%;
        padding: 0 2px 6px; font-size: 15px; line-height: 1.6;
        color: var(--text); margin-bottom: 8px;
      }
      .msg-a .md p { margin: 0 0 0.8em 0; }
      .msg-a .md pre {
        background: var(--surface-strong);
        border: 1px solid var(--glass-border);
        padding: 0.9em; border-radius: 12px; overflow-x: auto;
        font-family: 'DM Mono', monospace; font-size: 13px;
      }

      .msg-actions { display: flex; gap: 6px; margin-top: 6px; opacity: 0; transition: opacity 0.15s; }
      .msg-a:hover .msg-actions, .msg-u-wrap:hover .msg-actions { opacity: 1; }
      .msg-action-btn { width: 24px; height: 24px; border: none; background: transparent; color: var(--muted); cursor: pointer; }
      .msg-action-btn:hover { color: var(--acc); }
      .msg-action-btn svg { width: 13px; height: 13px; display: block; }

      .tool-t {
        display: flex; align-items: center; gap: 5px;
        padding: 2px 0 7px; color: var(--muted);
        font-size: 13px; font-family: 'DM Mono', monospace;
      }
      .tool-t::before, .tool-t::after { content: ''; flex: 1; height: 1px; background: var(--tool-line); }
      .t-verb { color: var(--acc); }

      /* ── INPUT ── */
      .in-area { padding: 10px 14px 12px; background: var(--bg); transition: background 0.2s; }
      .in-area.drag-active { background: var(--surface-soft); border: 2px dashed var(--acc); }
      .in-area-in { max-width: 860px; margin: 0 auto; }
      .attached-files {
        display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
        padding: 0 4px;
      }
      .attached-file {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 10px; background: var(--surface-soft); border: 1px solid var(--glass-border);
        border-radius: 8px; font-size: 12px; color: var(--text);
      }
      .attached-file .file-name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .attached-file .file-remove {
        cursor: pointer; color: var(--muted); margin-left: 2px; padding: 2px 4px;
        border-radius: 4px; transition: background 0.12s;
      }
      .attached-file .file-remove:hover { background: rgba(220, 38, 38, 0.2); color: #dc2626; }
      .in-pill {
        background: var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 18px; padding: 10px 12px;
        display: flex; align-items: center; gap: 7px;
        box-shadow: 0 2px 12px rgba(124,58,237,0.06);
      }
      .in-f {
        flex: 1; background: transparent; border: none; outline: none;
        font-family: 'DM Sans', sans-serif; font-size: 15px;
        color: var(--text); resize: none; line-height: 1.45;
      }
      .in-f::placeholder { color: var(--muted); }
      .in-ic {
        width: 28px; height: 28px; border-radius: 10px;
        background: var(--surface-soft); border: 1px solid var(--glass-border);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        color: var(--muted); transition: background 0.12s;
      }
      .in-ic:hover { background: var(--acc-light); color: var(--acc); }
      .send-btn {
        width: 32px; height: 32px; border-radius: 12px;
        background: var(--acc); border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 12px rgba(124,58,237,0.30);
        transition: transform 0.12s, box-shadow 0.12s;
      }
      .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(124,58,237,0.38); }

      .disc { text-align: center; font-size: 12px; color: rgba(124,58,237,0.25); padding: 4px 14px 8px; }

      /* ── CANVAS ── */
      .canvas { width: 0; overflow: hidden; display: flex; flex-direction: column; background: var(--surface); border-left: 1px solid var(--glass-border); }
      .canvas.open { width: 290px; min-width: 290px; }
      .cv-h { padding: 9px 12px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
      .cv-title { font-size: 13px; font-weight: 600; color: var(--text); }
      .cv-fname { font-size: 11px; color: var(--muted); }
      .cv-tabs { display: flex; border-bottom: 1px solid var(--glass-border); }
      .cv-tab { flex: 1; padding: 6px 8px; font-size: 13px; text-align: center; cursor: pointer; color: var(--muted); }
      .cv-tab.on { color: var(--acc); border-bottom: 2px solid var(--acc); font-weight: 500; }
      .cv-body { flex: 1; overflow-y: auto; padding: 12px; }
      .dv { background: var(--surface-soft); border: 1px solid var(--glass-border); border-radius: 9px; overflow: hidden; }
      .dv-tb { padding: 7px 11px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 6px; font-size: 12px; color: var(--muted); }
      .dv-body { padding: 11px; font-size: 13px; color: var(--text); }

      .hidden { display: none !important; }
      .error-banner {
        position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25);
        color: #dc2626; padding: 8px 16px; border-radius: 8px; z-index: 10;
      }
    </style>
</head>
<body>
    <div class="error-banner hidden" id="error-banner"></div>

    <div class="body">
        <!-- SIDEBAR -->
        <div class="sb">
            <div class="sb-top">
                <div class="logo">
                    <!-- Gemme SVG violette -->
                    <img class="logo-gem" src="./assets/gem.svg" alt="BISSI logo" width="28" height="28"/>
                    <span class="logo-name">BISSI</span>
                    <span class="logo-badge">Master</span>
                </div>
                <button class="new-btn" onclick="newChat()">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
                    Nouveau chat
                </button>
            </div>

            <div class="bulk-actions" id="bulk-actions">
                <div class="bulk-count" id="bulk-count">0 sélectionnée</div>
                <button class="bulk-btn" type="button" title="Archiver la sélection" onclick="bulkArchiveSelected()">
                    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M3 4h10M5 4V2.8c0-.44.36-.8.8-.8h4.4c.44 0 .8.36.8.8V4M4 4.5V13h8V4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="bulk-btn danger" type="button" title="Supprimer la sélection" onclick="bulkDeleteSelected()">
                    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M6 2.5h4M3.5 4h9M5 4l.4 8.5h5.2L11 4M6.5 6v4M9.5 6v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="bulk-btn" type="button" title="Annuler" onclick="exitSelectionMode()">✕</button>
            </div>

            <div class="conversations">
                <div class="sec">
                    <div class="sec-lbl">Aujourd'hui</div>
                    <div id="conversations-today"></div>
                </div>
                <div class="sec">
                    <div class="sec-lbl">Cette semaine</div>
                    <div id="conversations-week"></div>
                </div>
            </div>

            <div class="sb-foot">
                <div class="av" id="user-avatar">SY</div>
                <div>
                    <div class="u-name" id="user-name">Sam Yevi</div>
                    <div class="u-sub">Local · Offline</div>
                </div>
                <button class="ic-btn" id="th-btn" onclick="toggleTheme()" title="Changer le thème">☀</button>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="m-head">
                <button class="ic-btn" onclick="toggleSidebar()" title="Sidebar">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h3v10H2zM7 2h5v10H7z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="ms" id="ms" onclick="toggleDD()">
                    <div class="m-dot" id="ms-dot" style="background:var(--acc)"></div>
                    <span id="ms-name">Chargement...</span>
                    <span class="ms-arrow" id="ms-arr">▼</span>
                    <div class="ms-dd hidden" id="ms-dd">
                        <div class="ms-glbl">Modèles installés</div>
                        <div id="models-list"></div>
                    </div>
                </div>
                <button class="think-w" onclick="toggleThink()">
                    <div class="tgl" id="tgl"></div>Thinking
                </button>
            </div>

            <!-- EMPTY STATE — sans cards -->
            <div class="empty" id="empty">
                <img class="e-gem" src="./assets/gem.svg" width="80" height="80" alt="Gemme"/>
                <div class="e-title">Comment puis-je vous aider ?</div>
            </div>

            <div class="msgs hidden" id="chat">
                <div class="msgs-in" id="messages-container"></div>
            </div>

            <div class="in-area">
                <div class="in-area-in">
                    <div class="attached-files" id="attached-files"></div>
                    <div class="in-pill">
                         <button class="in-ic" onclick="openFilePicker()" title="Joindre des fichiers">
                            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M9.5 5.5L5.5 9.5A2.83 2.83 0 011.5 5.5L5.5 1.5A1.89 1.89 0 018.5 4.5L4.5 8A.94.94 0 013.5 7l3-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
                        </button>
                        <textarea class="in-f" id="message-input" rows="1" placeholder="Décrivez votre tâche..." onkeydown="handleInputKeydown(event)"></textarea>
                        <button class="in-ic" id="voice-btn" type="button" title="Dictée vocale">
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                                <rect x="5.25" y="2" width="5.5" height="8.5" rx="2.75" stroke="currentColor" stroke-width="1.35"/>
                                <path d="M3.25 7.75a4.75 4.75 0 0 0 9.5 0" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
                                <path d="M8 11.25V13.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
                                <path d="M5.75 13.5h4.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <button class="send-btn" onclick="sendMessage()">
                            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 9V2M2.5 5L5.5 2 8.5 5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="disc">AI generated · for reference only</div>
        </div>

        <!-- CANVAS -->
        <div class="canvas" id="canvas">
            <div class="cv-h">
                <div>
                    <div class="cv-title">Canvas</div>
                    <div class="cv-fname" id="canvas-filename">Document</div>
                </div>
                <button class="ic-btn" onclick="closeCanvas()">✕</button>
            </div>
            <div class="cv-tabs">
                <div class="cv-tab on" onclick="swTab('doc',this)">Document</div>
                <div class="cv-tab" onclick="swTab('tbl',this)">Données</div>
                <div class="cv-tab" onclick="swTab('code',this)">Code</div>
            </div>
            <div class="cv-body">
                <div id="td"><div class="dv"><div class="dv-tb"><span>DOCX</span><span id="doc-name" style="margin-left:5px">document.docx</span></div><div class="dv-body" id="doc-content">En attente...</div></div></div>
                <div id="tt" class="hidden"><div class="dv"><div class="dv-tb"><span>XLSX</span></div><div class="dv-body"><table id="data-table"><tr><td>En attente...</td></tr></table></div></div></div>
                <div id="tc" class="hidden"><div class="dv"><div class="dv-tb"><span>PY</span></div><div class="dv-body" id="code-content">En attente...</div></div></div>
            </div>
        </div>
    </div>

    <script src="./vendor/markdown-it.min.js"></script>
    <script>
        let light = true, think = true, ddOpen = false;
        let currentConversationId = null;
        let isStreaming = false;
        let userProfile = null;
        let openConversationMenuId = null;
        let selectionMode = false;
        let selectedConversationIds = new Set();
        let attachedFiles = new Map(); // Map<id, File>
        const API = 'http://localhost:8765';

        window.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            await loadUserProfile();
            await loadModels();
            await loadConversations();
            setupFileAttachment();
        });

        async function loadUserProfile() {
            try {
                const profile = await window.bissi.profile.load();
                if (profile) {
                    userProfile = profile;
                    // Build a robust display name and initials from available profile fields
                    const candidates = [profile.first_name, profile.last_name, profile.display_name, profile.username, profile.email && profile.email.split('@')[0]]
                        .filter(Boolean);
                    const displayName = (profile.display_name || ([profile.first_name, profile.last_name].filter(Boolean).join(' ')) || profile.username || profile.email || 'Utilisateur').trim();
                    // Compute initials: take first letters of first two candidate parts
                    let initials = '';
                    if (profile.first_name || profile.last_name) {
                        initials = ((profile.first_name && profile.first_name[0]) || '') + ((profile.last_name && profile.last_name[0]) || '');
                    } else if (profile.display_name) {
                        const parts = profile.display_name.split(/\s+/).filter(Boolean);
                        initials = (parts[0] && parts[0][0] || '') + ((parts[1] && parts[1][0]) || '');
                    } else if (profile.username) {
                        initials = (profile.username[0] || '') + (profile.username[1] || '');
                    } else if (profile.email) {
                        const local = profile.email.split('@')[0];
                        initials = (local[0] || '') + (local[1] || '');
                    }
                    initials = initials.toUpperCase() || '??';
                    document.getElementById('user-avatar').textContent = initials;
                    document.getElementById('user-name').textContent = displayName;
                }
            } catch (e) { console.warn('loadUserProfile failed', e); }
        }

        async function loadModels() {
            try {
                const [ollamaData, modelsData] = await Promise.all([window.bissi.ollama.models(), window.bissi.models.list()]);
                const modelsList = document.getElementById('models-list');
                modelsList.innerHTML = '';
                if (ollamaData.available && ollamaData.models) {
                    ollamaData.models.forEach(model => {
                        const opt = document.createElement('div');
                        opt.className = 'ms-opt';
                        opt.innerHTML = `<div class="m-dot" style="background:var(--acc)"></div>${model.name}`;
                        opt.onclick = (e) => { e.stopPropagation(); selectModel(model.name); };
                        modelsList.appendChild(opt);
                    });
                }
                document.getElementById('ms-name').textContent = modelsData.activeModel || (ollamaData.models?.[0]?.name) || 'Prêt';
            } catch (e) {
                document.getElementById('ms-name').textContent = 'Prêt';
            }
        }

        async function loadConversations() {
            try {
                const res = await fetch(`${API}/conversations`);
                if (res.ok) displayConversations(await res.json());
            } catch (e) {}
        }

        function displayConversations(conversations) {
            const todayEl = document.getElementById('conversations-today');
            todayEl.innerHTML = '';
            conversations.forEach(conv => {
                const el = document.createElement('div');
                el.className = 'ci' + (conv.id === currentConversationId ? ' on' : '') + (selectionMode ? ' select-mode' : '') + (selectedConversationIds.has(conv.id) ? ' selected' : '');
              const title = conv.title || (conv.first_message ? conv.first_message.slice(0, 35) : 'Nouveau chat');
              el.innerHTML = `
                  <span class="ci-select" aria-hidden="true">✓</span>
                  <span class="ci-t"></span>
                  <div class="ci-actions">
                      <button class="ci-menu-btn" type="button" aria-label="Actions" title="Actions">⋯</button>
                  </div>
                  <div class="ci-menu hidden" role="menu">
                      <button class="ci-menu-item" type="button" data-action="select">Sélectionner</button>
                      <button class="ci-menu-item" type="button" data-action="rename">Renommer</button>
                      <button class="ci-menu-item" type="button" data-action="archive">Archiver</button>
                      <button class="ci-menu-item danger" type="button" data-action="delete">Supprimer</button>
                  </div>
              `;
              el.querySelector('.ci-t').textContent = title;
              const titleEl = el.querySelector('.ci-t');
              titleEl.setAttribute('role', 'button');
              titleEl.setAttribute('tabindex', '0');
              titleEl.onclick = (e) => {
                  e.stopPropagation();
                  if (selectionMode) {
                      toggleSelectedConversation(conv.id);
                  } else {
                      loadConversation(conv.id);
                  }
              };
              titleEl.addEventListener('keydown', e => {
                  if (e.key === 'Enter' || e.key === ' ') {
                      e.preventDefault();
                      if (selectionMode) {
                          toggleSelectedConversation(conv.id);
                      } else {
                          loadConversation(conv.id);
                      }
                  }
              });
              el.addEventListener('click', e => {
                  if (e.target.closest('.ci-actions') || e.target.closest('.ci-menu') || e.target.closest('.ci-select')) return;
                  if (selectionMode) {
                      toggleSelectedConversation(conv.id);
                  }
              });
              const menuBtn = el.querySelector('.ci-menu-btn');
              const menu = el.querySelector('.ci-menu');
              // Prevent clicks on the menu/button from bubbling to the parent .ci (which opens the convo)
              menuBtn.addEventListener('mousedown', e => { e.stopPropagation(); });
              menuBtn.addEventListener('touchstart', e => { e.stopPropagation(); });
              menu.addEventListener('mousedown', e => { e.stopPropagation(); });
              menu.addEventListener('touchstart', e => { e.stopPropagation(); });

              menuBtn.onclick = e => {
                  e.preventDefault();
                  e.stopPropagation();
                  toggleConversationMenu(conv.id, el);
              };
              menu.querySelectorAll('.ci-menu-item').forEach(btn => {
                  // Also block mousedown/touchstart to avoid parent handlers firing before click
                  btn.addEventListener('mousedown', e => { e.stopPropagation(); });
                  btn.addEventListener('touchstart', e => { e.stopPropagation(); });

                  btn.onclick = async e => {
                      e.preventDefault();
                      e.stopPropagation();
                      const action = btn.dataset.action;
                      closeConversationMenus();
                      if (action === 'select') enterSelectionMode(conv.id);
                      if (action === 'rename') await renameConversation(conv.id, title);
                      if (action === 'archive') await archiveConversation(conv.id);
                      if (action === 'delete') await deleteConversation(conv.id);
                  };
              });
              todayEl.appendChild(el);
            });
        }

        async function loadConversation(id) {
            currentConversationId = id;
            try {
                const res = await fetch(`${API}/conversations/${id}/history`);
                if (res.ok) { renderHistory(await res.json()); showChat(); }
            } catch (e) {}
        }

        function toggleConversationMenu(id, itemEl) {
            // Use a floating cloned menu appended to document.body to avoid stacking / overflow issues
            const willOpen = openConversationMenuId !== id;
            closeConversationMenus();
            if (!willOpen) return;
            const menu = itemEl.querySelector('.ci-menu');
            const menuBtn = itemEl.querySelector('.ci-menu-btn');
            if (!menu || !menuBtn) return;

            // Clone and append to body
            const clone = menu.cloneNode(true);
            clone.classList.add('floating-ci-menu');
            clone.classList.remove('hidden');
            clone.style.visibility = 'hidden';
            document.body.appendChild(clone);

            // Position near the button
            const btnRect = menuBtn.getBoundingClientRect();
            const cw = clone.offsetWidth;
            const ch = clone.offsetHeight;
            let left = Math.min(Math.max(8, Math.round(btnRect.right - cw)), Math.max(8, window.innerWidth - cw - 8));
            let top = Math.round(btnRect.bottom + 6);
            if (top + ch > window.innerHeight - 8) top = Math.round(btnRect.top - ch - 6);
            clone.style.left = left + 'px';
            clone.style.top = top + 'px';
            clone.style.visibility = 'visible';

            itemEl.classList.add('ci-menu-open');
            openConversationMenuId = id;

            // Prevent bubbling to underlying elements
            clone.addEventListener('mousedown', e => e.stopPropagation());
            clone.addEventListener('touchstart', e => e.stopPropagation());

            // Attach handlers to cloned items
            clone.querySelectorAll('.ci-menu-item').forEach(btn => {
                btn.addEventListener('mousedown', e => e.stopPropagation());
                btn.addEventListener('touchstart', e => e.stopPropagation());
                btn.addEventListener('click', async e => {
                    e.preventDefault(); e.stopPropagation();
                    const action = btn.dataset.action;
                    closeConversationMenus();
                    if (action === 'select') enterSelectionMode(id);
                    if (action === 'rename') await renameConversation(id, itemEl.querySelector('.ci-t').textContent);
                    if (action === 'archive') await archiveConversation(id);
                    if (action === 'delete') await deleteConversation(id);
                });
            });
        }

        function closeConversationMenus() {
            // remove floating clones
            document.querySelectorAll('.floating-ci-menu').forEach(n => n.remove());
            // hide inline menus and clear open markers
            document.querySelectorAll('.ci-menu').forEach(menu => menu.classList.add('hidden'));
            document.querySelectorAll('.ci-menu-open').forEach(item => item.classList.remove('ci-menu-open'));
            openConversationMenuId = null;
        }

        function enterSelectionMode(seedId = null) {
            selectionMode = true;
            closeConversationMenus();
            if (seedId !== null) selectedConversationIds.add(seedId);
            updateSelectionUI();
            loadConversations();
        }

        function exitSelectionMode() {
            selectionMode = false;
            closeConversationMenus();
            selectedConversationIds.clear();
            updateSelectionUI();
            loadConversations();
        }

        function toggleSelectedConversation(id) {
            if (selectedConversationIds.has(id)) {
                selectedConversationIds.delete(id);
            } else {
                selectedConversationIds.add(id);
            }
            if (selectedConversationIds.size === 0) {
                selectionMode = false;
            }
            updateSelectionUI();
            loadConversations();
        }

        function updateSelectionUI() {
            const bulk = document.getElementById('bulk-actions');
            const count = document.getElementById('bulk-count');
            if (!bulk || !count) return;
            const n = selectedConversationIds.size;
            bulk.classList.toggle('on', selectionMode);
            count.textContent = n + (n <= 1 ? ' sélectionnée' : ' sélectionnées');
        }

        async function bulkArchiveSelected() {
            const ids = Array.from(selectedConversationIds);
            if (!ids.length) return;
            try {
                await Promise.all(ids.map(async id => {
                    const res = await fetch(`${API}/conversations/${id}/archive`, { method: 'PATCH' });
                    if (!res.ok) {
                        const data = await res.json().catch(() => ({}));
                        throw new Error(data.detail || `HTTP ${res.status}`);
                    }
                }));
                if (currentConversationId && selectedConversationIds.has(currentConversationId)) newChat();
                exitSelectionMode();
                await loadConversations();
            } catch (e) {
                console.error('Bulk archive failed:', e);
                alert('Archivage impossible');
            }
        }

        async function bulkDeleteSelected() {
            const ids = Array.from(selectedConversationIds);
            if (!ids.length) return;
            const ok = confirm('Supprimer les conversations sélectionnées ? Cette action supprimera définitivement toutes les conversations et tous leurs messages.');
            if (!ok) return;
            try {
                await Promise.all(ids.map(async id => {
                    const res = await fetch(`${API}/conversations/${id}`, { method: 'DELETE' });
                    if (!res.ok) {
                        const data = await res.json().catch(() => ({}));
                        throw new Error(data.error || data.detail || `HTTP ${res.status}`);
                    }
                }));
                if (currentConversationId && selectedConversationIds.has(currentConversationId)) newChat();
                exitSelectionMode();
                await loadConversations();
            } catch (e) {
                console.error('Bulk delete failed:', e);
                alert('Suppression impossible');
            }
        }

        async function renameConversation(id, currentTitle) {
            const fallback = String(currentTitle || '').trim() || 'Conversation';
            const nextTitle = window.prompt('Nouveau titre de conversation', fallback);
            if (nextTitle === null) return;
            const title = nextTitle.trim();
            if (!title) return;
            try {
                const res = await fetch(`${API}/conversations/${id}/title`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || `HTTP ${res.status}`);
                }
                await loadConversations();
            } catch (e) {
                console.error('Rename conversation failed:', e);
                alert('Renommage impossible');
            }
        }

        async function archiveConversation(id) {
            try {
                const res = await fetch(`${API}/conversations/${id}/archive`, { method: 'PATCH' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || `HTTP ${res.status}`);
                }
                if (currentConversationId === id) {
                    newChat();
                }
                await loadConversations();
            } catch (e) {
                console.error('Archive conversation failed:', e);
                alert('Archivage impossible');
            }
        }

        async function deleteConversation(id) {
            const ok = confirm('Supprimer la conversation ? Cette action supprimera définitivement la conversation et tous ses messages.');
            if (!ok) return;
            try {
                const res = await fetch(`${API}/conversations/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || data.detail || `HTTP ${res.status}`);
                }
                if (currentConversationId === id) {
                    newChat();
                }
                await loadConversations();
            } catch (e) {
                console.error('Delete conversation failed:', e);
                alert('Suppression impossible');
            }
        }

        function renderHistory(messages) {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            for (const msg of messages) {
                if (msg.role === 'user') appendUserMsg(msg.content);
                else if (msg.role === 'assistant') appendAssistantMsg(msg.content);
            }
        }

        let themePreference = localStorage.getItem('bissi-theme') || 'system';
        let themeMediaQuery = null;

        function applyTheme(mode) {
            const light = mode === 'light';
            document.body.classList.toggle('light', light);
            const btn = document.getElementById('th-btn');
            if (btn) btn.textContent = light ? '☽' : '☀';
        }

        function getSystemTheme() {
            return themeMediaQuery && themeMediaQuery.matches ? 'dark' : 'light';
        }

        function syncThemeToPreference() {
            if (themePreference === 'system') {
                applyTheme(getSystemTheme());
            }
        }

        // Theme toggle — dark/light mode with localStorage persistence
        function toggleTheme() {
            const nextMode = document.body.classList.contains('light') ? 'dark' : 'light';
            themePreference = nextMode;
            localStorage.setItem('bissi-theme', nextMode);
            applyTheme(nextMode);
        }
        
        // Initialize theme on page load
        function initTheme() {
            themeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            if (themePreference === 'system') {
                applyTheme(getSystemTheme());
                const onChange = () => syncThemeToPreference();
                if (typeof themeMediaQuery.addEventListener === 'function') {
                    themeMediaQuery.addEventListener('change', onChange);
                } else if (typeof themeMediaQuery.addListener === 'function') {
                    themeMediaQuery.addListener(onChange);
                }
            } else {
                applyTheme(themePreference);
            }
        }
        function toggleSidebar() { document.querySelector('.sb').classList.toggle('collapsed'); }
        function toggleThink() { think = !think; document.getElementById('tgl').classList.toggle('off', !think); }
        function toggleDD() { ddOpen = !ddOpen; document.getElementById('ms-dd').classList.toggle('hidden', !ddOpen); }

        // File attachment system
        function setupFileAttachment() {
            const inArea = document.querySelector('.in-area');
            const textarea = document.getElementById('message-input');
            
            // Drag & drop
            inArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                inArea.classList.add('drag-active');
            });
            inArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                if (e.target === inArea) inArea.classList.remove('drag-active');
            });
            inArea.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                inArea.classList.remove('drag-active');
                addFiles(e.dataTransfer.files);
            });
            
            // Paste from clipboard
            textarea.addEventListener('paste', (e) => {
                const files = e.clipboardData?.files;
                if (files && files.length > 0) {
                    e.preventDefault();
                    addFiles(files);
                }
            });
        }
        
        function openFilePicker() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '*/*';
            input.onchange = (e) => addFiles(e.target.files);
            input.click();
        }
        
        function addFiles(files) {
            for (let file of files) {
                const id = `file-${Date.now()}-${Math.random()}`;
                attachedFiles.set(id, file);
                renderAttachedFile(id, file);
            }
        }
        
        function renderAttachedFile(id, file) {
            const container = document.getElementById('attached-files');
            const el = document.createElement('div');
            el.className = 'attached-file';
            el.id = id;
            el.innerHTML = `
                <span class="file-name" title="${file.name}">${file.name}</span>
                <span class="file-remove" onclick="removeFile('${id}')">✕</span>
            `;
            container.appendChild(el);
        }
        
        function removeFile(id) {
            attachedFiles.delete(id);
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        document.addEventListener('click', e => {
            if (ddOpen && !document.getElementById('ms').contains(e.target)) {
                ddOpen = false;
                document.getElementById('ms-dd').classList.add('hidden');
            }
            if (openConversationMenuId !== null) {
                const openMenu = document.querySelector('.ci-menu-open');
                if (openMenu && !openMenu.contains(e.target)) {
                    closeConversationMenus();
                }
            }
        });
        function selectModel(name) { document.getElementById('ms-name').textContent = name; toggleDD(); }

        function newChat() { currentConversationId = null; document.getElementById('messages-container').innerHTML = ''; exitSelectionMode(); showEmpty(); closeCanvas(); }
        function showEmpty() { document.getElementById('empty').classList.remove('hidden'); document.getElementById('chat').classList.add('hidden'); }
        function showChat() { document.getElementById('empty').classList.add('hidden'); document.getElementById('chat').classList.remove('hidden'); }
        function handleInputKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || isStreaming) return;
            appendUserMsg(message);
            input.value = '';
            input.style.height = 'auto';
            showChat();
            isStreaming = true;
            let assistantMsgEl = null;
            let accumulatedText = '';
            try {
                // Build FormData with message and files
                const formData = new FormData();
                formData.append('message', message);
                if (currentConversationId) formData.append('conversation_id', currentConversationId);
                
                // Add attached files
                for (const [id, file] of attachedFiles) {
                    formData.append('files', file);
                }
                
                const res = await fetch(`${API}/chat`, { 
                    method: 'POST', 
                    body: formData 
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.trim().startsWith('data:')) continue;
                        try {
                            const data = JSON.parse(line.trim().slice(5));
                            if (data.type === 'chunk' && data.content) {
                                accumulatedText += data.content;
                                if (!assistantMsgEl) assistantMsgEl = createAssistantMsgEl('');
                                assistantMsgEl.querySelector('.md').innerHTML = renderAssistantText(accumulatedText);
                                assistantMsgEl.scrollIntoView();
                            } else if (data.type === 'done') {
                                currentConversationId = data.conversation_id || currentConversationId;
                                attachedFiles.clear();
                                document.getElementById('attached-files').innerHTML = '';
                                loadConversations();
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) { console.error(e); }
            finally { isStreaming = false; }
        }

        function appendUserMsg(text) {
            console.log('appendUserMsg:', text);
            const container = document.getElementById('messages-container');
            if (!container) { console.warn('messages-container not found'); return; }
            const wrap = document.createElement('div');
            wrap.className = 'msg-u-wrap';
            wrap.innerHTML = `<div class="msg-u">${text}</div>`;
            container.appendChild(wrap);
            // ensure chat area is visible when adding a message
            showChat();
            // small visual aid while debugging: focus newly added message
            try { wrap.scrollIntoView({ behavior: 'smooth', block: 'end' }); } catch (e) { container.scrollTop = container.scrollHeight; }
        }

        function createAssistantMsgEl(html) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = 'msg-a';
            div.innerHTML = `<div class="md">${html}</div>`;
            container.appendChild(div);
            return div;
        }

        function appendAssistantMsg(text) { createAssistantMsgEl(renderAssistantText(text)); }

        function renderAssistantText(text) {
            const source = String(text || '').replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
            if (window.markdownit) return window.markdownit().render(source);
            return source.replace(/\n/g, '<br>');
        }

        function openCanvas(tab) { document.getElementById('canvas').classList.add('open'); }
        function closeCanvas() { document.getElementById('canvas').classList.remove('open'); }
        function swTab(name) {
            const idx = ['doc', 'tbl', 'code'].indexOf(name);
            document.querySelectorAll('.cv-tab').forEach((t, i) => t.classList.toggle('on', i === idx));
            ['td', 'tt', 'tc'].forEach((id, i) => document.getElementById(id).classList.toggle('hidden', i !== idx));
        }
    </script>
</body>
